<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Sidebar</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-btn">
        <i class='bx bx-menu' id="btn"></i>
    </div>

    <div class="sidebar">
        <div class="logo-details">
            <span class="logo_name">CodingLab</span>
            <i class='bx bx-x' id="close-btn"></i>
        </div>
        
        <ul class="nav-list">
            <li><a href="#"><i class='bx bx-grid-alt'></i><span>Dashboard</span></a></li>
            <li><a href="#"><i class='bx bx-link-alt'></i><span>Shortcuts</span></a></li>
            <li><a href="#"><i class='bx bx-list-ul'></i><span>Overview</span></a></li>
            <li><a href="#"><i class='bx bx-calendar-event'></i><span>Events</span></a></li>
            <li><a href="#"><i class='bx bx-help-circle'></i><span>About</span></a></li>
            <li><a href="#"><i class='bx bx-cog'></i><span>Services</span></a></li>
            <li><a href="#"><i class='bx bx-phone'></i><span>Contact</span></a></li>
            <li><a href="#"><i class='bx bx-chat'></i><span>Feedback</span></a></li>
        </ul>

        <div class="social-links">
            <a href="#"><i class='bx bxl-facebook' style="color: #3b5998;"></i></a>
            <a href="#"><i class='bx bxl-twitter' style="color: #1da1f2;"></i></a>
            <a href="#"><i class='bx bxl-instagram' style="color: #e1306c;"></i></a>
            <a href="#"><i class='bx bxl-youtube' style="color: #ff0000;"></i></a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
